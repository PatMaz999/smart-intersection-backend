<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Smart Intersection - Symulacja</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: row; justify-content: center; padding: 20px; gap: 40px;}
        h1 { color: #ecf0f1; text-align: center; width: 100%; position: absolute; top: 0; left: 0;}

        .panel { margin-top: 60px; display: flex; flex-direction: column; align-items: center; }

        /* Skrzyżowanie zrobione jako siatka 3x3 */
        .intersection-wrapper { display: grid; grid-template-columns: 160px 160px 160px; grid-template-rows: 160px 160px 160px; gap: 10px; margin-top: 20px; }

        .road { background-color: #34495e; border: 2px dashed #7f8c8d; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; border-radius: 8px; font-weight: bold;}
        .road-title { font-size: 16px; margin-bottom: 8px; color: #ecf0f1; }
        .road-stats { font-size: 12px; font-weight: normal; color: #f1c40f; text-align: center; background: #2c3e50; padding: 5px; border-radius: 4px; width: 90%;}

        .center { background-color: #7f8c8d; border: 2px solid #bdc3c7; display: flex; align-items: center; justify-content: center; text-align: center; flex-direction: column;}
        .empty { background: transparent; border: none; }

        /* Konkretne pozycje na siatce */
        #north { grid-column: 2; grid-row: 1; border-bottom: none; border-bottom-left-radius: 0; border-bottom-right-radius: 0; justify-content: flex-end;}
        #west  { grid-column: 1; grid-row: 2; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; justify-content: center;}
        #east  { grid-column: 3; grid-row: 2; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; justify-content: center;}
        #south { grid-column: 2; grid-row: 3; border-top: none; border-top-left-radius: 0; border-top-right-radius: 0; justify-content: flex-start;}
        #center { grid-column: 2; grid-row: 2; }

        .controls { background: #34495e; padding: 20px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; align-items: center;}
        textarea { width: 350px; height: 250px; background: #1e272e; color: #f1c40f; font-family: monospace; border: 1px solid #7f8c8d; padding: 10px; border-radius: 4px; resize: none;}

        .speed-control { display: flex; align-items: center; gap: 10px; margin-top: 15px; width: 100%; justify-content: space-between; background: #2c3e50; padding: 8px 12px; border-radius: 4px; box-sizing: border-box;}
        .speed-control select { padding: 5px; border-radius: 4px; background: #ecf0f1; border: none; font-weight: bold; cursor: pointer;}

        .button-group { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
        button { flex: 1; color: white; border: none; padding: 12px 10px; font-size: 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s;}

        .btn-start { background-color: #27ae60; }
        .btn-start:hover { background-color: #2ecc71; transform: scale(1.02);}
        .btn-start:disabled { background-color: #95a5a6; cursor: not-allowed; transform: none;}

        .btn-stop { background-color: #c0392b; display: none; }
        .btn-stop:hover { background-color: #e74c3c; transform: scale(1.02);}

        #stepCounter { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #f1c40f; height: 30px;}
        .log-box { margin-top: 20px; width: 350px; height: 150px; background: #1e272e; color: #0be881; font-family: monospace; padding: 10px; overflow-y: scroll; text-align: left; border-radius: 4px;}
        .car-badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 14px; margin: 2px; display: inline-block;}
    </style>
</head>
<body>

<h1>Smart Intersection 🚦</h1>

<div class="panel">
    <div id="stepCounter">Gotowy do symulacji</div>
    <div class="intersection-wrapper">
        <div class="empty"></div>
        <div id="north" class="road">
            <div class="road-stats" id="north-stats">Kolejka: 0<br>Nast: -</div>
            <div class="road-title">PÓŁNOC</div>
        </div>
        <div class="empty"></div>

        <div id="west" class="road">
            <div class="road-title">ZACHÓD</div>
            <div class="road-stats" id="west-stats">Kolejka: 0<br>Nast: -</div>
        </div>
        <div id="center" class="center">
            <span style="color:#2c3e50; font-size: 12px;">Skrzyżowanie</span>
        </div>
        <div id="east" class="road">
            <div class="road-title">WSCHÓD</div>
            <div class="road-stats" id="east-stats">Kolejka: 0<br>Nast: -</div>
        </div>

        <div class="empty"></div>
        <div id="south" class="road">
            <div class="road-title">POŁUDNIE</div>
            <div class="road-stats" id="south-stats">Kolejka: 0<br>Nast: -</div>
        </div>
        <div class="empty"></div>
    </div>
</div>

<div class="panel controls">
    <h3>Scenariusz JSON</h3>
    <textarea id="jsonInput">
{
  "commands": [
    {
      "type": "addVehicle",
      "vehicleId": "V1",
      "startRoad": "south",
      "endRoad": "north"
    },
    {
      "type": "addVehicle",
      "vehicleId": "V2",
      "startRoad": "north",
      "endRoad": "south"
    },
    {
      "type": "step"
    },
    {
      "type": "step"
    },
    {
      "type": "addVehicle",
      "vehicleId": "V3",
      "startRoad": "west",
      "endRoad": "south"
    },
    {
      "type": "addVehicle",
      "vehicleId": "V4",
      "startRoad": "west",
      "endRoad": "south"
    },
    {
      "type": "step"
    },
    {
      "type": "step"
    },
    {
      "type": "step"
    }
  ]
}
        </textarea>

    <div class="speed-control">
        <label for="speedSelect">Prędkość symulacji:</label>
        <select id="speedSelect">
            <option value="1200">x1 (Normalna)</option>
            <option value="600">x2 (Szybka)</option>
            <option value="300">x4 (Bardzo szybka)</option>
        </select>
    </div>

    <div class="button-group">
        <button id="runBtn" class="btn-start" onclick="startSimulation()">Rozpocznij Symulację</button>
        <button id="stopBtn" class="btn-stop" onclick="stopSimulation()">Przerwij</button>
    </div>

    <div class="log-box" id="logs">Czekam na dane wejściowe...<br></div>
</div>

<script>
    window.onload = function() {
        alert("⚠️ UWAGA: Poniższa wizualizacja została przygotowana wyłącznie do celów demonstracyjnych. Kod frontendu nie jest przeznaczony do wdrożenia na środowisku produkcyjnym!");
    };

    let activeTimeoutId = null;
    let isSimulationRunning = false;

    function logInfo(msg) {
        const logs = document.getElementById('logs');
        logs.innerHTML += msg + "<br>";
        logs.scrollTop = logs.scrollHeight;
    }

    function getTurnDirection(start, end) {
        const map = {
            'north-south': 'PROSTO', 'north-east': 'LEWO', 'north-west': 'PRAWO',
            'south-north': 'PROSTO', 'south-west': 'LEWO', 'south-east': 'PRAWO',
            'west-east': 'PROSTO', 'west-north': 'LEWO', 'west-south': 'PRAWO',
            'east-west': 'PROSTO', 'east-south': 'LEWO', 'east-north': 'PRAWO'
        };
        return map[start + '-' + end] || '?';
    }

    function updateRoadStats(queues) {
        const directions = ['north', 'south', 'east', 'west'];
        directions.forEach(dir => {
            const statsDiv = document.getElementById(dir + '-stats');
            const queue = queues[dir];
            let nextText = '-';
            if (queue.length > 0) {
                nextText = `${queue[0].id} (${queue[0].turn})`;
            }
            statsDiv.innerHTML = `Kolejka: ${queue.length}<br>Nast: <span style="color:#0be881">${nextText}</span>`;
        });
    }

    async function startSimulation() {
        const runBtn = document.getElementById('runBtn');
        const stopBtn = document.getElementById('stopBtn');
        const jsonText = document.getElementById('jsonInput').value;
        let payload;

        try {
            payload = JSON.parse(jsonText);
        } catch (e) {
            alert("Niepoprawny format JSON!");
            return;
        }

        runBtn.disabled = true;
        stopBtn.style.display = 'block';
        document.getElementById('logs').innerHTML = "";
        isSimulationRunning = true;

        updateRoadStats({ north: [], south: [], east: [], west: [] });

        logInfo("Wysyłanie danych do backendu (/simulate)...");

        try {
            const response = await fetch('/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error("Błąd HTTP: " + response.status);
            }

            const data = await response.json();
            logInfo("Odpowiedź odebrana! Rozpoczynam animację...");

            playSimulation(data.stepStatuses, payload.commands, runBtn, stopBtn);

        } catch (error) {
            logInfo("Błąd połączenia z backendem! Upewnij się, że serwer działa.");
            console.error(error);
            resetButtons(runBtn, stopBtn);
        }
    }

    function playSimulation(steps, commands, runBtn, stopBtn) {
        let currentStep = 0;
        let cmdIdx = 0;

        let queues = { north: [], south: [], east: [], west: [] };

        function loadCarsUntilNextStep() {
            while (cmdIdx < commands.length && commands[cmdIdx].type !== 'step') {
                const cmd = commands[cmdIdx];
                if (cmd.type === 'addVehicle' && queues[cmd.startRoad]) {
                    queues[cmd.startRoad].push({
                        id: cmd.vehicleId,
                        turn: getTurnDirection(cmd.startRoad, cmd.endRoad)
                    });
                }
                cmdIdx++;
            }
        }

        loadCarsUntilNextStep();
        updateRoadStats(queues);

        function executeStep() {
            if (!isSimulationRunning) return;

            if (currentStep >= steps.length) {
                document.getElementById('stepCounter').innerText = "Symulacja Zakończona!";
                document.getElementById('center').innerHTML = `<span style="color:#2c3e50; font-size: 12px;">Skrzyżowanie</span>`;
                logInfo("Koniec symulacji.");
                resetButtons(runBtn, stopBtn);
                return;
            }

            const stepData = steps[currentStep];
            const leftCars = stepData.leftVehicles || [];

            leftCars.forEach(carId => {
                for (let road in queues) {
                    queues[road] = queues[road].filter(car => car.id !== carId);
                }
            });

            updateRoadStats(queues);

            document.getElementById('stepCounter').innerText = `Krok: ${currentStep + 1} / ${steps.length}`;
            if(leftCars.length > 0) {
                logInfo(`[Krok ${currentStep + 1}] Zjazd: ${leftCars.join(", ")}`);
                const carBadges = leftCars.map(car => `<span class="car-badge">${car}</span>`).join("");
                document.getElementById('center').innerHTML = carBadges;
            } else {
                logInfo(`[Krok ${currentStep + 1}] Skrzyżowanie puste / Zmiana świateł`);
                document.getElementById('center').innerHTML = "";
            }

            if (cmdIdx < commands.length && commands[cmdIdx].type === 'step') {
                cmdIdx++;
            }

            loadCarsUntilNextStep();
            updateRoadStats(queues);

            currentStep++;

            const currentDelay = parseInt(document.getElementById('speedSelect').value, 10);

            activeTimeoutId = setTimeout(executeStep, currentDelay);
        }

        const initialDelay = parseInt(document.getElementById('speedSelect').value, 10);
        activeTimeoutId = setTimeout(executeStep, initialDelay);
    }

    function stopSimulation() {
        if (isSimulationRunning) {
            isSimulationRunning = false;
            if (activeTimeoutId !== null) {
                clearTimeout(activeTimeoutId);
                activeTimeoutId = null;
            }

            document.getElementById('stepCounter').innerText = "Symulacja Przerwana!";
            document.getElementById('center').innerHTML = `<span style="color:#2c3e50; font-size: 12px;">Skrzyżowanie</span>`;
            logInfo("--- Symulacja została zatrzymana ---");

            const runBtn = document.getElementById('runBtn');
            const stopBtn = document.getElementById('stopBtn');
            resetButtons(runBtn, stopBtn);
        }
    }

    function resetButtons(runBtn, stopBtn) {
        runBtn.disabled = false;
        stopBtn.style.display = 'none';
        isSimulationRunning = false;
    }
</script>
</body>
</html>
